ge-03-clean.png"/><a class="catalog-button" href="page-06.html" style="left:128.23px;top:180.9px;width:328.81px;height:219.71px"><img src="images/catalog-left-01-page06.png"/></a><a class="catalog-button" href="page-08.html" style="left:318.85px;top:467.44px;width:322.54px;height:344.7px"><img src="images/catalog-left-02-page08.png"/></a><a class="catalog-button" href="page-09.html" style="left:169.19px;top:971.21px;width:401.61px;height:340.82px"><img src="images/catalog-left-03-page09.png"/></a><a class="catalog-button" href="page-11.html" style="left:280px;top:1448.72px;width:400.17px;height:252.05px"><img src="images/catalog-left-04-page11.png"/></a><a class="catalog-button" href="page-05.html" style="left:829.84px;top:121.47px;width:501.66px;height:279.24px"><img src="images/catalog-right-01-page05.png"/></a><a class="catalog-button" href="page-07.html" style="left:784.2px;top:581.34px;width:344.95px;height:480px"><img src="images/catalog-right-02-page07.png"/></a><a class="catalog-button" href="page-10.html" style="left:859.75px;top:1226.25px;width:500px;height:281.25px"><img src="images/catalog-right-03-page10.png"/></a></section><section id="page-04" class="pdf-page" style="height:900px"><img class="page-image" src="../public/clean-images/page-04-clean.png"/></section></main><script>addEventListener('pointermove',e=>{const layer=document.querySelector('.pixel-trail-layer');if(!layer)return;for(let i=0;i<1;i++){const b=document.createElement('span');const s=5+Math.floor(Math.random()*13);b.className='pixel-trail-block';b.style.left=e.clientX+(Math.random()-.5)*2+'px';b.style.top=e.clientY+(Math.random()-.5)*2+'px';b.style.width=s+'px';b.style.height=s+'px';b.style.animationDelay=i*16+'ms';layer.appendChild(b);setTimeout(()=>b.remove(),780)}})</script><script>(function(){const t=document.querySelector('[data-type-content]');if(!t)return;const text="\u6211\u662f\u53f6\u5b50\uff0c\u4e00\u540d\u8de8\u9886\u57df\u89c6\u89c9\u8bbe\u8ba1\u5e08\u3002\u6211\u7684\u521b\u4f5c\u6db5\n\u76d6\u6e38\u620f\u8bbe\u8ba1\u3001\u54c1\u724c\u8bbe\u8ba1\u3001UI \u8bbe\u8ba1\u30013D \u89c6\u89c9\u3001\u52a8\n\u6001\u5f71\u50cf\u4e0e\u4ea4\u4e92\u4f53\u9a8c\uff0c\u5173\u6ce8\u6982\u5ff5\u8868\u8fbe\u4e0e\u7528\u6237\u611f\u53d7\u4e4b\n\u95f4\u7684\u8054\u7cfb\u3002\u5e0c\u671b\u901a\u8fc7\u591a\u5143\u5316\u7684\u8bbe\u8ba1\u8bed\u8a00\uff0c\u5c06\u62bd\u8c61\n\u60f3\u6cd5\u8f6c\u5316\u4e3a\u5177\u6709\u89c6\u89c9\u5438\u5f15\u529b\u4e0e\u4f53\u9a8c\u4ef7\u503c\u7684\u4f5c\u54c1\u3002";let i=0;function n(){t.textContent=text.slice(0,i);if(i<text.length){i++;setTimeout(n,75)}}setTimeout(n,250)})();</script><script>document.querySelectorAll('.lanyard-scene').forEach(s=>{const b=s.querySelector('.lanyard-badge');s.addEventListener('pointermove',e=>{const r=s.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;s.style.setProperty('--badge-ry',x*18+'deg');s.style.setProperty('--badge-rx',-y*14+'deg');s.style.setProperty('--cord-x',x*18+'px')});s.addEventListener('pointerleave',()=>{s.style.setProperty('--badge-ry','0deg');s.style.setProperty('--badge-rx','0deg');s.style.setProperty('--cord-x','0px')})})</script><script>(function(){let last=0;addEventListener('pointermove',e=>{let layer=document.querySelector('.pixel-trail-layer');if(!layer){layer=document.createElement('div');layer.className='pixel-trail-layer';document.body.appendChild(layer)}let cursor=document.querySelector('.pixel-cursor');if(!cursor){cursor=document.createElement('span');cursor.className='pixel-cursor';layer.appendChild(cursor)}cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';const now=performance.now();if(now-last<58)return;last=now;const b=document.createElement('span');b.className='pixel-trail-block';b.style.left=e.clientX+(Math.random()-.5)*2+'px';b.style.top=e.clientY+(Math.random()-.5)*2+'px';layer.appendChild(b);setTimeout(()=>b.remove(),480)},{passive:true})})();</script></body></html>
